<div class="frame">
    <div class="weatherReportMap">
        <div class="heading2">
            <label><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSE8SljkFmk5CL4iiswsT1zXyvLbu8bMwCpkw&s" width="30px" /> &nbsp;Live Weather Map</label>
        </div>
        <div>
            <iframe class="live" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=5&overlay=wind&product=ecmwf&level=surface&lat=50&lon=14" frameborder="0"></iframe>
        </div>
    </div>

    <div class="weatherReportNews">
        <div class="heading2">
            <label>Weather News</label>
        </div>
        <div class="newsContent" *ngFor="let news of searchResult">
                <div class="newsImg" *ngIf="news.image!=null">
                    <img [src]="news.image" class="newsImage" (error)="news.image='https://img.freepik.com/premium-vector/breaking-news-background-style_23-2148525710.jpg'">
                    <div class="newsTitle">{{news.title}}</div>
                </div>
                <div class="newsImg" *ngIf="news.image==null">
                    <img src="https://img.freepik.com/premium-vector/breaking-news-background-style_23-2148525710.jpg"
                        class="image">
                </div>   
        </div>
    </div>
    <!-- <iframe src="https://www.rainviewer.com/hurricane-map.html?loc=11.7996,80.4173,5.584799248667708&layer=sat&hu=1&ts=1" width="100%" frameborder="0" style="border:0;height:80vh;" ></iframe> -->
</div>
